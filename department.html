<!DOCTYPE html>
<html lang="bn">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="MediTest BD - মেডিকেল বিভাগের বিস্তারিত তথ্য"
    >

    <title>
        বিভাগের বিস্তারিত | MediTest BD
    </title>


    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- Header -->

    <header id="header">

        <div class="site-header">

            <a
                href="index.html"
                class="logo"
            >

                🩺 MediTest BD

            </a>


            <button
                id="menuButton"
                class="menu-button"
                type="button"
                aria-label="মেনু খুলুন"
            >

                ☰

            </button>


            <nav
                id="mainNav"
                class="main-nav"
            >

                <a href="index.html">
                    হোম
                </a>


                <a href="tests.html">
                    টেস্টসমূহ
                </a>


                <a href="diseases.html">
                    রোগসমূহ
                </a>


                <a href="hospitals.html">
                    হাসপাতাল
                </a>


                <a href="diagnostic-centers.html">
                    ডায়াগনস্টিক সেন্টার
                </a>


                <a
                    href="departments.html"
                    class="active"
                >
                    বিভাগসমূহ
                </a>

            </nav>

        </div>

    </header>


    <!-- Main Content -->

    <main class="page-container">


        <!-- Breadcrumb -->

        <nav
            class="breadcrumb"
            aria-label="Breadcrumb"
        >

            <a href="index.html">
                হোম
            </a>


            <span>
                /
            </span>


            <a href="departments.html">
                বিভাগসমূহ
            </a>


            <span>
                /
            </span>


            <span id="breadcrumbDepartmentName">
                বিস্তারিত
            </span>

        </nav>


        <!-- Department Details -->

        <section
            id="departmentDetails"
            class="details-container"
        >

            <div class="loading-box">

                ⏳ বিভাগের তথ্য লোড হচ্ছে...

            </div>

        </section>


    </main>


    <!-- Footer -->

    <footer id="footer">

        <div class="footer-content">

            <p>
                © 2026 MediTest BD
            </p>


            <p>
                মেডিকেল তথ্যভিত্তিক প্ল্যাটফর্ম
            </p>

        </div>

    </footer>


    <!-- Mobile Menu -->

    <script>

        const menuButton =
            document.getElementById(
                "menuButton"
            );


        const mainNav =
            document.getElementById(
                "mainNav"
            );


        if (
            menuButton &&
            mainNav
        ) {

            menuButton.addEventListener(
                "click",
                () => {

                    mainNav.classList.toggle(
                        "show"
                    );

                }
            );

        }

    </script>


    <!-- Page JavaScript -->

    <script
        type="module"
        src="js/department.js"
    ></script>


</body>

</html>
