<!DOCTYPE html>
<html lang="bn">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="MediTest BD - বাংলাদেশের মেডিকেল টেস্টের তথ্য, মূল্য এবং বিস্তারিত তথ্য"
    >

    <title>
        মেডিকেল টেস্টসমূহ | MediTest BD
    </title>


    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- Header -->

    <header id="header">

        <div class="site-header">

            <a
                href="index.html"
                class="logo"
            >

                🩺 MediTest BD

            </a>


            <button
                id="menuButton"
                class="menu-button"
                type="button"
                aria-label="মেনু খুলুন"
            >

                ☰

            </button>


            <nav
                id="mainNav"
                class="main-nav"
            >

                <a href="index.html">
                    হোম
                </a>

                <a
                    href="tests.html"
                    class="active"
                >
                    টেস্টসমূহ
                </a>

                <a href="diseases.html">
                    রোগসমূহ
                </a>

                <a href="hospitals.html">
                    হাসপাতাল
                </a>

                <a href="diagnostic-centers.html">
                    ডায়াগনস্টিক সেন্টার
                </a>

            </nav>

        </div>

    </header>


    <!-- Main Content -->

    <main class="page-container">


        <!-- Page Heading -->

        <section class="page-hero">

            <h1>
                🧪 সকল মেডিকেল টেস্ট
            </h1>

            <p>
                বিভিন্ন মেডিকেল টেস্টের নাম, মূল্য এবং বিস্তারিত তথ্য খুঁজে দেখুন।
            </p>

        </section>


        <!-- Search -->

        <section class="search-section">

            <label
                for="testSearchInput"
                class="sr-only"
            >
                টেস্ট সার্চ করুন
            </label>


            <input
                type="search"
                id="testSearchInput"
                placeholder="🔍 টেস্টের নাম বা কীওয়ার্ড লিখুন..."
                autocomplete="off"
            >


            <button
                id="clearSearchButton"
                type="button"
                class="clear-search-button"
            >
                পরিষ্কার
            </button>

        </section>


        <!-- Category Filter -->

        <section class="filter-section">

            <label
                for="categoryFilter"
            >

                ক্যাটাগরি:

            </label>


            <select
                id="categoryFilter"
            >

                <option value="all">
                    সকল ক্যাটাগরি
                </option>

            </select>

        </section>


        <!-- Result Information -->

        <div
            id="resultInfo"
            class="result-info"
        >

            টেস্ট লোড হচ্ছে...

        </div>


        <!-- Test List -->

        <section
            id="testList"
            class="test-grid"
            aria-live="polite"
        >

            <div class="loading-box">

                ⏳ টেস্ট লোড হচ্ছে...

            </div>

        </section>


    </main>


    <!-- Footer -->

    <footer id="footer">

        <div class="footer-content">

            <p>
                © 2026 MediTest BD
            </p>

            <p>
                মেডিকেল টেস্ট সম্পর্কে তথ্যভিত্তিক প্ল্যাটফর্ম
            </p>

        </div>

    </footer>


    <!-- Mobile Menu -->

    <script>

        const menuButton =
            document.getElementById("menuButton");

        const mainNav =
            document.getElementById("mainNav");


        if (menuButton && mainNav) {

            menuButton.addEventListener(
                "click",
                () => {

                    mainNav.classList.toggle(
                        "show"
                    );

                }
            );

        }

    </script>


    <!-- Page JavaScript -->

    <script
        type="module"
        src="js/tests.js"
    ></script>


</body>

</html>
