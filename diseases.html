<!DOCTYPE html>
<html lang="bn">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="MediTest BD - বিভিন্ন রোগের কারণ, লক্ষণ ও তথ্য"
    >

    <title>
        রোগসমূহ | MediTest BD
    </title>


    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- Header -->

    <header id="header">

        <div class="site-header">

            <a
                href="index.html"
                class="logo"
            >

                🩺 MediTest BD

            </a>


            <button
                id="menuButton"
                class="menu-button"
                type="button"
                aria-label="মেনু খুলুন"
            >

                ☰

            </button>


            <nav
                id="mainNav"
                class="main-nav"
            >

                <a href="index.html">
                    হোম
                </a>

                <a href="tests.html">
                    টেস্টসমূহ
                </a>

                <a
                    href="diseases.html"
                    class="active"
                >
                    রোগসমূহ
                </a>

                <a href="hospitals.html">
                    হাসপাতাল
                </a>

                <a href="diagnostic-centers.html">
                    ডায়াগনস্টিক সেন্টার
                </a>

            </nav>

        </div>

    </header>


    <!-- Main Content -->

    <main class="page-container">


        <!-- Page Hero -->

        <section class="page-hero">

            <h1>
                🦠 রোগসমূহ
            </h1>


            <p>
                বিভিন্ন রোগ সম্পর্কে তথ্য, লক্ষণ ও বিস্তারিত জানতে খুঁজুন।
            </p>

        </section>


        <!-- Search -->

        <section class="search-section">

            <label
                for="diseaseSearchInput"
                class="sr-only"
            >

                রোগের নাম বা লক্ষণ দিয়ে সার্চ করুন

            </label>


            <input
                type="search"
                id="diseaseSearchInput"
                placeholder="🔍 রোগের নাম বা লক্ষণ লিখুন..."
                autocomplete="off"
            >


            <button
                id="clearDiseaseSearchButton"
                type="button"
                class="clear-search-button"
            >

                পরিষ্কার

            </button>

        </section>


        <!-- Result Information -->

        <div
            id="diseaseResultInfo"
            class="result-info"
        >

            রোগের তথ্য লোড হচ্ছে...

        </div>


        <!-- Disease List -->

        <section
            id="diseaseList"
            class="disease-grid"
            aria-live="polite"
        >

            <div class="loading-box">

                ⏳ রোগের তথ্য লোড হচ্ছে...

            </div>

        </section>


    </main>


    <!-- Footer -->

    <footer id="footer">

        <div class="footer-content">

            <p>
                © 2026 MediTest BD
            </p>


            <p>
                মেডিকেল তথ্যভিত্তিক প্ল্যাটফর্ম
            </p>

        </div>

    </footer>


    <!-- Mobile Menu -->

    <script>

        const menuButton =
            document.getElementById(
                "menuButton"
            );


        const mainNav =
            document.getElementById(
                "mainNav"
            );


        if (
            menuButton &&
            mainNav
        ) {

            menuButton.addEventListener(
                "click",
                () => {

                    mainNav.classList.toggle(
                        "show"
                    );

                }
            );

        }

    </script>


    <!-- Page JavaScript -->

    <script
        type="module"
        src="js/diseases.js"
    ></script>


</body>

</html>
