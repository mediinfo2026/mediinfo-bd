<!DOCTYPE html>

<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
MediTest BD - Settings
</title>



<style>


body{

font-family:"Noto Sans Bengali",Arial,sans-serif;

background:#f5f7fb;

margin:0;

}



header{

background:#0F62FE;

color:white;

padding:20px;

text-align:center;

}


header h1{

margin:0;

font-size:28px;

}




.container{

width:90%;

max-width:700px;

margin:25px auto;

}




.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 4px 15px rgba(0,0,0,.08);

}



h2{

color:#0F62FE;

margin-top:0;

}




label{

display:block;

margin-top:15px;

font-weight:bold;

}




input,
textarea{


width:100%;

padding:12px;

margin-top:8px;

border:1px solid #ddd;

border-radius:8px;

font-size:16px;

box-sizing:border-box;


}




textarea{

height:120px;

resize:vertical;

}





button{


padding:12px 20px;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

margin-top:20px;

margin-right:10px;


}




.save-btn{

background:#0F62FE;

color:white;

}



.save-btn:hover{

background:#0848b8;

}




.reset-btn{

background:#dc3545;

color:white;

}



.reset-btn:hover{

background:#a71d2a;

}




footer{

text-align:center;

padding:20px;

color:#777;

}





@media(max-width:600px){


.container{

width:94%;

}



.card{

padding:18px;

}


}



</style>


</head>



<body>




<header>


<h1>
🩺 MediTest BD
</h1>


<p>
Website Settings
</p>


</header>






<div class="container">



<div class="card">



<h2>
⚙️ Site Settings
</h2>




<label>
Website Name
</label>


<input

id="siteName"

placeholder="MediTest BD"

>





<label>
Website Description
</label>


<textarea

id="description"

placeholder="Medical Test Information Database"

></textarea>






<label>
Contact Information
</label>


<input

id="contact"

placeholder="Email / Phone"

>






<label>
Footer Text
</label>


<input

id="footer"

placeholder="© 2026 MediTest BD"

>







<button

class="save-btn"

onclick="saveSettings()"

>

💾 Save Settings

</button>





<button

class="reset-btn"

onclick="resetSettings()"

>

Reset

</button>






</div>



</div>







<footer>

© 2026 MediTest BD Admin

</footer>








<script

type="module"

src="setting.js">

</script>



</body>


</html>
