<!DOCTYPE html>

<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
MediTest BD - Categories Admin
</title>



<style>


body{

font-family:"Noto Sans Bengali",Arial,sans-serif;

background:#f5f7fb;

margin:0;

}



header{

background:#0F62FE;

color:white;

padding:20px;

text-align:center;

}



header h1{

margin:0;

}



.container{

width:90%;

max-width:900px;

margin:25px auto;

}





.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 4px 15px rgba(0,0,0,.08);

margin-bottom:25px;

}



h2{

color:#0F62FE;

}



label{

display:block;

font-weight:bold;

margin-top:12px;

}




input,
textarea{


width:100%;

padding:12px;

margin-top:8px;

border:1px solid #ddd;

border-radius:8px;

font-size:16px;

box-sizing:border-box;


}



textarea{

height:100px;

}





button{


background:#0F62FE;

color:white;

border:none;

padding:11px 18px;

border-radius:8px;

cursor:pointer;

margin-top:12px;

}



button:hover{

background:#0848b8;

}



.search-btn{

background:#198754;

}



.category-card{


background:#f8faff;

border:1px solid #ddd;

padding:15px;

border-radius:12px;

margin:15px 0;


}



.category-card h3{

color:#0F62FE;

margin-top:0;

}




footer{


text-align:center;

padding:20px;

color:#777;


}




@media(max-width:600px){


.container{

width:94%;

}



.card{

padding:15px;

}


}



</style>


</head>



<body>




<header>


<h1>
🩺 MediTest BD
</h1>


<p>
Test Category Management
</p>


</header>







<div class="container">






<!-- Add Category -->


<div class="card">


<h2>
➕ নতুন Category যোগ করুন
</h2>





<label>
Category Name
</label>


<input

id="name"

placeholder="যেমন: Blood Test"

>






<label>
Slug
</label>


<input

id="slug"

placeholder="যেমন: blood-test"

>






<label>
Description
</label>


<textarea

id="description"

placeholder="Category সম্পর্কে লিখুন"

></textarea>






<button onclick="addCategory()">

💾 Save Category

</button>



</div>









<!-- Search -->


<div class="card">


<h2>
🔍 Category Search
</h2>





<input

id="searchSlug"

placeholder="Slug দিয়ে Search"

>






<button

class="search-btn"

onclick="searchCategory()"

>

Search

</button>



</div>









<!-- Category List -->


<div class="card">


<h2>
📋 Category List
</h2>




<div id="categoryList">


লোড হচ্ছে...

</div>



</div>






</div>








<footer>

© 2026 MediTest BD Admin

</footer>








<script

type="module"

src="categories.js">

</script>



</body>

</html>
