<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MediInfo BD - Admin Login</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f6fb;
}

.login-box{
    max-width:400px;
    margin:80px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#1565c0;
}

p{
    text-align:center;
    color:#666;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#1565c0;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

#error{
    color:red;
    text-align:center;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="login-box">

<h1>MediInfo BD</h1>

<p>Admin Login</p>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<p id="error"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
