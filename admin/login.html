<!DOCTYPE html>

<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
MediTest BD Admin Login
</title>



<style>


*{

box-sizing:border-box;

}



body{

margin:0;

font-family:"Noto Sans Bengali",Arial,sans-serif;

background:#f5f7fb;

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}




.login-box{


width:90%;

max-width:400px;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,.1);


}



.logo{

text-align:center;

margin-bottom:25px;

}



.logo h1{

color:#0F62FE;

margin:0;

font-size:28px;

}



.logo p{

color:#666;

}





label{

display:block;

margin-top:15px;

font-weight:bold;

}




input{


width:100%;

padding:13px;

margin-top:8px;

border:1px solid #ddd;

border-radius:8px;

font-size:16px;


}



button{


width:100%;

padding:13px;

margin-top:25px;

background:#0F62FE;

color:white;

border:none;

border-radius:8px;

font-size:17px;

cursor:pointer;


}



button:hover{


background:#0848b8;


}




.note{

text-align:center;

margin-top:20px;

font-size:14px;

color:#777;

}




</style>


</head>



<body>




<div class="login-box">



<div class="logo">


<h1>
🩺 MediTest BD
</h1>


<p>
Admin Panel Login
</p>


</div>






<label>
Email Address
</label>


<input

type="email"

id="email"

placeholder="admin@gmail.com"

>




<label>
Password
</label>


<input

type="password"

id="password"

placeholder="Password"

>






<button onclick="adminLogin()">

🔐 Login

</button>





<p class="note">

শুধুমাত্র Admin ব্যবহার করতে পারবেন

</p>




</div>







<script

type="module"

src="login.js">

</script>




</body>

</html>
