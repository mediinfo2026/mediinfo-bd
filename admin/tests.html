<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tests Manager | MediInfo BD</title>

    <link rel="stylesheet" href="../style.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f4f7fb;
            font-family: Arial, "Noto Sans Bengali", sans-serif;
            color: #222;
        }

        .admin-header {
            background: #1565c0;
            color: white;
            padding: 18px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .admin-header h1 {
            margin: 0;
            font-size: 24px;
        }

        .dashboard-link {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .page-container {
            width: 95%;
            max-width: 1250px;
            margin: 25px auto;
        }

        .toolbar {
            background: white;
            padding: 18px;
            border-radius: 12px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
        }

        #searchInput {
            flex: 1;
            min-width: 220px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        .primary-btn {
            border: none;
            background: #1565c0;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .primary-btn:hover {
            background: #0d47a1;
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            min-width: 850px;
            border-collapse: collapse;
        }

        thead {
            background: #1565c0;
            color: white;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f7faff;
        }

        .action-btn {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            color: white;
        }

        .edit-btn {
            background: #2e7d32;
        }

        .delete-btn {
            background: #c62828;
        }

        .loading,
        .empty {
            text-align: center;
            padding: 35px;
            font-size: 17px;
        }

        .hidden {
            display: none;
        }

        /* Modal */

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 999;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 700px;
            max-height: 92vh;
            overflow-y: auto;
            background: white;
            border-radius: 14px;
            padding: 25px;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #1565c0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 7px;
            font-size: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn {
            flex: 1;
            border: none;
            background: #1565c0;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .cancel-btn {
            flex: 1;
            border: none;
            background: #777;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .admin-header {
                padding: 15px;
            }

            .admin-header h1 {
                font-size: 20px;
            }

            .modal-content {
                padding: 18px;
            }
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <h1>🧪 Test Manager</h1>

        <a href="dashboard.html" class="dashboard-link">
            ← Dashboard
        </a>
    </header>

    <main class="page-container">

        <section class="toolbar">

            <input
                type="search"
                id="searchInput"
                placeholder="টেস্টের নাম দিয়ে খুঁজুন..."
            >

            <button
                type="button"
                id="addTestBtn"
                class="primary-btn"
            >
                + Add Test
            </button>

        </section>

        <div id="loading" class="loading">
            Loading...
        </div>

        <div id="emptyMessage" class="empty hidden">
            কোনো টেস্ট পাওয়া যায়নি।
        </div>

        <section class="table-wrapper">

            <table>

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Test Name</th>
                        <th>Category</th>
                        <th>Department</th>
                        <th>Sample</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </section>

    </main>


    <!-- Add/Edit Modal -->

    <div
        id="testModal"
        class="modal"
    >

        <div class="modal-content">

            <h2 id="modalTitle">
                Add New Test
            </h2>

            <form id="testForm">

                <input
                    type="hidden"
                    id="docId"
                >

                <div class="form-group">
                    <label for="name">Test Name</label>

                    <input
                        type="text"
                        id="name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="slug">Slug</label>

                    <input
                        type="text"
                        id="slug"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>

                    <input
                        type="text"
                        id="category"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="department">Department</label>

                    <input
                        type="text"
                        id="department"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="sample">Sample</label>

                    <input
                        type="text"
                        id="sample"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="price">Price</label>

                    <input
                        type="number"
                        id="price"
                        min="0"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description</label>

                    <textarea
                        id="description"
                        rows="4"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="preparation">Preparation</label>

                    <textarea
                        id="preparation"
                        rows="3"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="reportTime">Report Time</label>

                    <input
                        type="text"
                        id="reportTime"
                        placeholder="যেমন: 24 Hours"
                    >
                </div>

                <div class="form-group">
                    <label for="normalRange">Normal Range</label>

                    <textarea
                        id="normalRange"
                        rows="3"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="purpose">Purpose</label>

                    <textarea
                        id="purpose"
                        rows="4"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="note">Note</label>

                    <textarea
                        id="note"
                        rows="3"
                    ></textarea>
                </div>

                <div class="modal-actions">

                    <button
                        type="submit"
                        class="save-btn"
                    >
                        Save Test
                    </button>

                    <button
                        type="button"
                        id="cancelBtn"
                        class="cancel-btn"
                    >
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div>


    <script
        type="module"
        src="tests.js"
    ></script>

</body>

</html>
