<!DOCTYPE html>

<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
MediTest BD - Hospitals Admin
</title>



<style>


body{

font-family:"Noto Sans Bengali",Arial,sans-serif;

background:#f5f7fb;

margin:0;

}



header{

background:#0F62FE;

color:white;

padding:20px;

text-align:center;

}


header h1{

margin:0;

}




.container{

width:90%;

max-width:900px;

margin:25px auto;

}





.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 4px 15px rgba(0,0,0,.08);

margin-bottom:25px;

}



h2{

color:#0F62FE;

}




input,
textarea{


width:100%;

padding:12px;

margin:8px 0;

border:1px solid #ddd;

border-radius:8px;

font-size:16px;

box-sizing:border-box;

}



textarea{

height:90px;

}



button{

background:#0F62FE;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

margin-top:10px;

}



button:hover{

background:#0848b8;

}




.search-btn{

background:#198754;

}



.delete-btn{

background:#dc3545;

}




.hospital-card{


background:#f8faff;

border:1px solid #ddd;

padding:15px;

border-radius:12px;

margin:15px 0;

}



.hospital-card h3{

color:#0F62FE;

margin-top:0;

}



footer{

text-align:center;

padding:20px;

color:#777;

}





@media(max-width:600px){


.container{

width:94%;

}



.card{

padding:15px;

}


}



</style>



</head>



<body>



<header>


<h1>
🩺 MediTest BD
</h1>


<p>
Hospital / Diagnostic Center Management
</p>


</header>






<div class="container">






<!-- Add Hospital -->

<div class="card">


<h2>
🏥 নতুন হাসপাতাল / সেন্টার যোগ করুন
</h2>




<input

id="name"

placeholder="Hospital / Diagnostic Name"

>




<input

id="city"

placeholder="City"

>




<textarea

id="address"

placeholder="Full Address"

></textarea>





<input

id="phone"

placeholder="Phone Number"

>




<input

id="website"

placeholder="Website Link"

>






<button onclick="addHospital()">

➕ Add Hospital

</button>




</div>








<!-- Search Hospital -->


<div class="card">


<h2>
🔍 Hospital Search
</h2>




<input

id="searchCity"

placeholder="Search By City"

>




<button

class="search-btn"

onclick="searchHospital()"

>

Search

</button>



</div>








<!-- Hospital List -->


<div class="card">


<h2>
📋 Hospital List
</h2>




<div id="hospitalList">


লোড হচ্ছে...

</div>



</div>






</div>








<footer>

© 2026 MediTest BD Admin

</footer>






<script

type="module"

src="hospitals.js">

</script>



</body>

</html>
