<!DOCTYPE html>

<html lang="bn">

<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
MediTest BD - Test Prices Admin
</title>



<style>


body{

font-family:"Noto Sans Bengali",Arial,sans-serif;

background:#f5f7fb;

margin:0;

}



header{

background:#0F62FE;

color:white;

padding:20px;

text-align:center;

}



header h1{

margin:0;

}




.container{

width:90%;

max-width:900px;

margin:20px auto;

}




.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 4px 15px rgba(0,0,0,.08);

margin-bottom:25px;

}



h2{

color:#0F62FE;

}




input{

width:100%;

padding:12px;

margin:8px 0;

border:1px solid #ddd;

border-radius:8px;

font-size:16px;

}



button{


background:#0F62FE;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

margin-top:10px;

}



button:hover{

background:#0848b8;

}




.search-box button{

background:#198754;

}




.price-card{


background:#f8faff;

border:1px solid #ddd;

padding:15px;

border-radius:12px;

margin:15px 0;


}



.price-card h3{

color:#0F62FE;

margin-top:0;

}



.delete-btn{

background:#dc3545;

}



.delete-btn:hover{

background:#a71d2a;

}




footer{

text-align:center;

padding:20px;

color:#777;

}




@media(max-width:600px){


.container{

width:94%;

}


.card{

padding:15px;

}



}



</style>



</head>



<body>



<header>


<h1>
🩺 MediTest BD
</h1>


<p>
Diagnostic Price Management
</p>


</header>






<div class="container">



<!-- Add Price -->


<div class="card">


<h2>
➕ নতুন টেস্ট মূল্য যোগ করুন
</h2>



<input 
id="testSlug"
placeholder="Test Slug (যেমন: hbsag)"
>



<input 
id="center"
placeholder="Diagnostic Center Name"
>



<input 
id="city"
placeholder="City"
>



<input 
id="price"
placeholder="Price"
type="number"
>




<button onclick="addPrice()">

Save Price

</button>



</div>







<!-- Search -->


<div class="card search-box">


<h2>
🔍 Test Price Search
</h2>



<input

id="searchSlug"

placeholder="Search Test Slug"

>



<button onclick="searchPrice()">

Search

</button>



</div>







<!-- Price List -->


<div class="card">


<h2>
📋 সব টেস্টের মূল্য তালিকা
</h2>



<div id="priceList">


লোড হচ্ছে...

</div>



</div>





</div>





<footer>

© 2026 MediTest BD

</footer>







<script type="module" src="test-prices.js"></script>



</body>


</html>
